apiVersion: v1
kind: ConfigMap
metadata:
  name: data-ingestion-config
  labels:
    app.kubernetes.io/name: data-ingestion
    app.kubernetes.io/part-of: upsure
data:
  UPSURE_SERVICE_NAME: "data-ingestion"
  UPSURE_SERVICE_VERSION: "1.1.0"
  UPSURE_ENV: "production"

  # Models can be pulled by the init container over HTTPS at pod startup,
  # so a pod restart re-fetches the artefacts without needing a PVC.
  #
  # Pointing at the UpSure CDN bucket. Leave empty to skip the sync (e.g.
  # when models are baked into the volume).
  UPSURE_MODELS_BASE_URL: "https://storage.googleapis.com/cdn_gcpupsure"
  UPSURE_DAMAGE_MODEL_FILE: "digiLifeDoc_damage_model.onnx"
  UPSURE_YOLO_MODEL_FILE: "digiLifeDoc_damage_detector_v2.onnx"
  UPSURE_CAR_MODEL_FILE: "digiLifeDoc_best_car_model_v2.onnx"

  # CORS allowlist for the UI. Override per-cluster.
  UPSURE_CORS_ORIGINS: "https://digi-motor.upsure.io"
  UPSURE_CORS_ALLOW_CREDENTIALS: "false"

  # Limits & timeouts
  UPSURE_MAX_UPLOAD_BYTES: "26214400"
  UPSURE_REQUEST_TIMEOUT_SECONDS: "120"
  UPSURE_OCR_SUBPROCESS_TIMEOUT_SECONDS: "90"

  # Logging
  UPSURE_LOG_LEVEL: "INFO"
  UPSURE_LOG_JSON: "true"
  UPSURE_LOG_INCLUDE_PATHS: "false"

  # Metrics
  UPSURE_METRICS_ENABLED: "true"
  UPSURE_METRICS_PATH: "/metrics"

  # Model behaviour
  UPSURE_PRELOAD_MODELS: "true"
  UPSURE_REQUIRE_MODELS_FOR_READY: "true"
  UPSURE_DAMAGE_MODEL: "/app/models/digiLifeDoc_damage_model.onnx"
  UPSURE_YOLO_MODEL: "/app/models/digiLifeDoc_damage_detector_v2.onnx"
  UPSURE_CAR_MODEL: "/app/models/digiLifeDoc_best_car_model_v2.onnx"
  UPSURE_CAR_THRESHOLD: "0.65"
  UPSURE_OCR_PYTHON: "/usr/local/bin/python"

  # Resilience
  UPSURE_CB_FAILURE_THRESHOLD: "5"
  UPSURE_CB_RECOVERY_SECONDS: "30"
  UPSURE_CB_HALF_OPEN_MAX_CALLS: "1"
  UPSURE_DAMAGE_CONCURRENCY: "4"
  UPSURE_OCR_CONCURRENCY: "2"

  # Server
  UPSURE_WORKERS: "1"
  UPSURE_WORKER_TIMEOUT: "180"
  UPSURE_GRACEFUL_TIMEOUT: "30"
  UPSURE_KEEPALIVE: "5"
  PORT: "8000"
