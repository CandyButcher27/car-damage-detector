apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion
  namespace: tameen
  labels:
    app: data-ingestion
spec:
  replicas: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: data-ingestion
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: data-ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      imagePullSecrets:
        - name: dockerauth
      terminationGracePeriodSeconds: 40
      containers:
        - name: data-ingestion
          image: asia.gcr.io/inbox-gcr/projects/data-ingestion:9943
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Load all non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: data-ingestion-config
          # Expose pod metadata to the app for structured logs
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          # Startup probe — gives up to 5 min for PaddleOCR / TF model load
          startupProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60      # 5-minute window for cold start
          # Liveness — restart the pod if it hangs
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness — remove from Service endpoints until models are loaded
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: "3Gi"
            limits:
              cpu: "2"
              memory: "3Gi"

          # Writable scratch dirs (root filesystem is read-only in production)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/.cache
            - name: paddle-cache
              mountPath: /home/upsure

          lifecycle:
            preStop:
              exec:
                # Give the LB time to drain before shutdown
                command: ["/bin/sh", "-c", "sleep 10"]

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
        - name: app-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: paddle-cache
          emptyDir:
            sizeLimit: 512Mi