apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion
  namespace: tameen
  labels:
    app: data-ingestion
spec:
  replicas: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: data-ingestion
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: data-ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      imagePullSecrets:
        - name: dockerauth
      terminationGracePeriodSeconds: 40

      # ── Init container: download model files from GCS before app starts ──
      # Set UPSURE_MODELS_BASE_URL in configmap to your GCS public/CDN URL.
      # e.g. https://storage.googleapis.com/cdn_gcpupsure
      # If empty, init exits cleanly and expects models already on the volume.
      initContainers:
        - name: model-sync
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              apk add --no-cache curl ca-certificates >/dev/null

              BASE="${UPSURE_MODELS_BASE_URL:-}"
              if [ -z "$BASE" ]; then
                echo "UPSURE_MODELS_BASE_URL not set — skipping model download."
                ls -la /app/models || true
                exit 0
              fi

              echo "Downloading models from: $BASE"

              download_if_missing() {
                FILENAME="$1"
                DEST="/app/models/${FILENAME}"
                if [ -f "$DEST" ]; then
                  echo "[skip] $FILENAME already present"
                  return
                fi
                echo "[fetch] $FILENAME"
                curl --fail --silent --show-error --location \
                     --retry 3 --retry-delay 5 \
                     --connect-timeout 15 --max-time 600 \
                     --output "$DEST" \
                     "${BASE}/${FILENAME}"
                echo "[done] $FILENAME ($(du -sh $DEST | cut -f1))"
              }

              download_if_missing "damage_model.onnx"
              download_if_missing "damage_detector_v2.onnx"
              download_if_missing "best_car_model_v2.onnx"
              download_if_missing "card_noncard_classifier_model.keras"

              echo "All models ready:"
              ls -lh /app/models/
          env:
            - name: UPSURE_MODELS_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: data-ingestion-config
                  key: UPSURE_MODELS_BASE_URL
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /app/models
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: data-ingestion
          image: asia.gcr.io/inbox-gcr/projects/data-ingestion:9945
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: data-ingestion-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # Startup probe — allows 5 min for models to load after init container finishes
          startupProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60

          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "1"
              memory: "3Gi"
            limits:
              cpu: "2"
              memory: "3Gi"

          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/.cache
            - name: paddle-cache
              mountPath: /home/upsure

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      volumes:
        - name: models
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
        - name: app-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: paddle-cache
          emptyDir:
            sizeLimit: 512Mi