paths:
  image_dir:        images
  label_dir:        labels
  dataset_csv:      dataset.csv
  model_onnx:       models/damage_model_single.onnx
  yolo_onnx:        models/damage_detector.onnx

yolo:
  img_size:     640
  conf_thresh:  0.25
  iou_thresh:   0.45
  classes:
    - car-part-crack
    - detachment
    - flat-tire
    - glass-crack
    - lamp-crack
    - minor-deformation
    - moderate-deformation
    - paint-chips
    - scratches
    - severe-deformation
    - side-mirror-crack

severity:
  minor_max:    0.05
  moderate_max: 0.15

image:
  extensions:      [".jpg", ".jpeg", ".png", ".webp", ".bmp"]
  max_px:          1600
  upscale_target:  1600
  jpeg_quality:    92
  unsharp_radius:  1.5
  unsharp_percent: 120
  unsharp_threshold: 3
  contrast_factor: 1.15

ollama:
  model:       qwen3-vl:235b-instruct-cloud
  base_url:    https://ollama.com
  temperature: 0.1
  max_tokens:  4096

batch_label:
  workers: 4

training:
  model_name:   efficientnet_b2
  img_size:     260
  batch_size:   16
  epochs:       25
  lr:           0.0003
  weight_decay: 0.0001
  num_workers:  0
  seed:         42
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

api:
  host:               0.0.0.0
  port:               8000
  img_size:           260
  damage_threshold:   0.25
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]
